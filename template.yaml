apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: box-upload-test
  title: Box File Upload
  description: Upload files to Box storage
  tags:
    - box
    - storage
    - upload
spec:
  owner: platform-team
  type: service

  parameters:
    - title: File Upload Configuration
      required:
        - fileName
        - fileContent
      properties:
        fileName:
          title: File Name
          type: string
          description: Name for the file in Box (with extension)
          default: document.txt
          pattern: '^[a-zA-Z0-9._-]+

print_success "Template updated to use HTTP action"

print_info "Creating catalog-info.yaml..."

cat > templates/catalog-info.yaml << 'EOF'
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: box-upload-templates
  description: Box file upload templates
spec:
  type: file
  targets:
    - ./box-test-template.yaml
