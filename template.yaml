apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: box-file-upload-example
  title: Upload File to Box (with File Picker)
  description: Upload a file to Box using custom file upload field
  tags:
    - box
    - file-upload
    - storage
spec:
  owner: platform-team
  type: service

  parameters:
    - title: File Upload
      required:
        - uploadedFile
        - targetFolder
      properties:
        uploadedFile:
          title: Select File to Upload
          type: object
          description: Choose a file from your computer to upload to Box
          ui:field: FileUpload
          ui:options:
            accept: '*/*'  # Accept all file types, or specify like 'image/*,.pdf,.doc'
            maxSize: 10485760  # 10MB in bytes
        
        targetFolder:
          title: Box Folder ID
          type: string
          description: Box folder ID where the file will be uploaded (0 = root folder)
          default: '0'
          ui:help: 'Find folder ID in Box URL: https://app.box.com/folder/FOLDER_ID'
        
        fileDescription:
          title: File Description (Optional)
          type: string
          description: Add a description for the uploaded file
          ui:widget: textarea
          ui:options:
            rows: 3

    - title: Box API Configuration
      required:
        - boxAccessToken
      properties:
        boxAccessToken:
          title: Box Access Token
          type: string
          description: Box API access token (get from Box Developer Console)
          ui:widget: password
          ui:help: 'Get token from: https://app.box.com/developers/console'

  steps:
    - id: log-file-info
      name: Log File Information
      action: debug:log
      input:
        message: |
          Uploading file to Box:
          - File Name: ${{ parameters.uploadedFile.name }}
          - File Size: ${{ parameters.uploadedFile.size }} bytes
          - File Type: ${{ parameters.uploadedFile.type }}
          - Target Folder: ${{ parameters.targetFolder }}

    - id: upload-to-box
      name: Upload File to Box
      action: box:upload:file
      input:
        accessToken: ${{ parameters.boxAccessToken }}
        folderId: ${{ parameters.targetFolder }}
        file: ${{ parameters.uploadedFile }}
        description: ${{ parameters.fileDescription }}

    - id: log-success
      name: Log Upload Success
      action: debug:log
      input:
        message: |
          ✅ File uploaded successfully!
          
          File ID: ${{ steps['upload-to-box'].output.fileId }}
          File Name: ${{ steps['upload-to-box'].output.fileName }}
          File URL: ${{ steps['upload-to-box'].output.fileUrl }}
          Shared Link: ${{ steps['upload-to-box'].output.sharedLink }}

  output:
    links:
      - title: View File in Box
        url: ${{ steps['upload-to-box'].output.fileUrl }}
        icon: dashboard
      - title: Shared Link
        url: ${{ steps['upload-to-box'].output.sharedLink }}
        icon: link
    
    text:
      - title: Upload Summary
        content: |
          ## ✅ File Uploaded Successfully!
          
          **File Details:**
          - **Name:** ${{ steps['upload-to-box'].output.fileName }}
          - **Box File ID:** ${{ steps['upload-to-box'].output.fileId }}
          - **Folder ID:** ${{ parameters.targetFolder }}
          
          **Access Links:**
          - [View in Box](${{ steps['upload-to-box'].output.fileUrl }})
          - [Shared Link](${{ steps['upload-to-box'].output.sharedLink }})
          
          **Original File Info:**
          - **Size:** ${{ parameters.uploadedFile.size }} bytes
          - **Type:** ${{ parameters.uploadedFile.type }}
          - **Last Modified:** ${{ parameters.uploadedFile.lastModified }}

