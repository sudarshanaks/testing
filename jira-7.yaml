apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ica-onboarding-7
  title: ICA Onboarding V7
  description: Create a new Jira issue with automatic duplicate detection
  tags:
    - jira
    - issue
    - automation
spec:
  owner: user:guest
  type: service
  
  parameters:


    - title: Project Information
      required:
        - projectContactName
        - projectContractId
        - projectContractEndDate
        - projectGbgId
        - offeringSelection
      properties:
        offeringSelection:
          title: Offering Selection
          type: string
          description: "Note: For POC, pls create a team in corresponding ICA regional instances by providing the Opportunity ID"
          enum:
            - "SaaS Delivery - IBM Access"
            - "SaaS Delivery - IBM & Client Access"
          default: "SaaS Delivery - IBM Access"
        projectContactName:
          title: Project Contact Name
          type: string
          format: email
          description: Contact name/email for the project
        projectContractId:
          title: Contract ID
          type: string
          description: Project contract ID
        projectContractEndDate:
          title: Contract End Date
          type: string
          format: date
          description: Project contract end date
          ui:field: "DatePicker"
          ui:options:
            dateFormat: "yyyy-MM-dd"
            showClearButton: true
        projectGbgId:
          title: GBG ID
          type: string
          description: Project GBG ID
        projectTypeOfUser:
          title: Type of Users
          type: string
          description: Type of users for this project
          default: "IBM Internal Only"
        projectNoOfExpectedEndUsers:
          title: Number of Expected End Users
          type: string
          description: Number of expected end users
          default: "3"
        projectDataUsage:
          title: Data Usage
          type: string
          description: Description of data usage
          default: "No production data or personal/business sensitive content will be used."
        
    - title: Client Information
      required:
        - clientName
        - clientLocation
      properties:
        clientName:
          title: Client Name
          type: string
          description: Name of the client
        clientLocation:
          title: Client Location
          type: string
          description: Location of the client
          default: "Canada"

        projectRegion:
          title: Geographical Region
          type: string
          description: Project geographical region
          enum:
            - "AMERICAS"
            - "APAC"
            - "EMEA"
            - "JAPAN"
          default: "AMERICAS"
                    
        projectSector:
          title: Sector
          type: string
          description: Project sector
          default: "IBM Account / Internal"
      dependencies:
        projectRegion:
          oneOf:
            - properties:
                projectRegion:
                  const: "AMERICAS"
                projectMarket:
                  title: Market
                  type: string
                  description: Project market in Americas
                  ui:options:
                    label: "Market"
                  enum:
                    - "Canadian Market"
                    - "Latin America Market"
                    - "US Top Market"
                    - "Latin America"
                icaInstance:
                  title: ICA Instance
                  type: string
                  description: ICA Regional Instance for Americas
                  ui:options:
                    label: "ICA Instance"
                  enum:
                    - "US: us.ica.ibm.com"
                    - "Canada: canada.ica.ibm.com"
            - properties:
                projectRegion:
                  const: "APAC"
                projectMarket:
                  title: Market
                  type: string
                  description: Project market in APAC
                  ui:options:
                    label: "Market"
                  enum:
                    - "ASEAN"
                    - "ASEAN Market"
                    - "ASEANZK Market"
                    - "Australia/New Zealand"
                    - "Australia/New Zealand Market"
                    - "Greater China Group Market"
                    - "Greater China Market"
                    - "India/South Asia"
                    - "India/South Asia Market"
                    - "Korea Market"
                icaInstance:
                  title: ICA Instance
                  type: string
                  description: ICA Regional Instance for APAC
                  ui:options:
                    label: "ICA Instance"
                  enum:
                    - "Australia: au.ica.ibm.com"
            - properties:
                projectRegion:
                  const: "EMEA"
                projectMarket:
                  title: Market
                  type: string
                  description: Project market in EMEA
                  ui:options:
                    label: "Market"
                  enum:
                    - "BeNeLux"
                    - "Central/Eastern Europe"
                    - "Central/Eastern Europe Market"
                    - "DACH"
                    - "DACH Market"
                    - "France Market"
                    - "Italy Market"
                    - "Middle East/Africa"
                    - "Middle East/Africa Market"
                    - "NCEE Market"
                    - "NorBNL Market"
                    - "Nordic"
                    - "Northern Europe Market"
                    - "SPGI"
                    - "SPGI Market"
                    - "UKI"
                    - "UKI Market"
                icaInstance:
                  title: ICA Instance
                  type: string
                  description: ICA Regional Instance for EMEA
                  ui:options:
                    label: "ICA Instance"
                  enum:
                    - "UKI: uki.ica.ibm.com"
                    - "R-EMEA: remea.ica.ibm.com"
            - properties:
                projectRegion:
                  const: "JAPAN"
                projectMarket:
                  title: Market
                  type: string
                  description: Project market in Japan
                  ui:options:
                    label: "Market"
                  enum:
                    - "Japan Market"
                icaInstance:
                  title: ICA Instance
                  type: string
                  description: ICA Regional Instance for Japan
                  ui:options:
                    label: "ICA Instance"
                  enum:
                    - "Japan: japan.ica.ibm.com"

    - title: Project Assets
      required:
        - accountCoachEmail
        - accountMentorEmail
        - accountTeamName
      properties:
        projectAssistantPacks:
          title: Assistants Packs in Scope
          type: array
          description: "Everyday Assistants will be available for every team"
          items:
            type: string
            enum:
              - "Assistant Pack for Adobe"
              - "IBM Assistant Pack for Business Operation"
              - "Assistant Pack for Discovery"
              - "Assistant Pack for Manage"
              - "Assistant Pack for Migration"
              - "Assistant Pack for Modernization"
              - "Assistant Pack for Quality Engineering"
              - "Assistant Pack for Software Development Lifecycle Build & Test"
              - "Assistant Pack for Software Development Lifecycle Deploy& Manage"
              - "Assistant Pack for Software Development Lifecycle Design"
              - "Assistant Pack for Software Development Lifecycle Discovery"
          ui:widget: "checkboxes"
        projectProductivityAssets:
          title: Productivity Assets in Scope
          type: array
          description: "Disclaimer: Not all assets are available in all regions"
          items:
            type: string
            enum:
              - "Logistics Control Tower (694914E)"
              - "PRISM (694975S)"
              - "Advisory Suite for AI and Data (694974B)"
              - "Customer Service Productivity Tools (694972H)"
              - "Neudesic Kinisi Data Migration Accelerator (694977N)"
              - "IBM Consulting AIOps (694971O)"
              - "IBM Consulting Application Management Suite (694975B)"
              - "IBM Consulting Cloud Accelerator (694986C)"
              - "IBM Consulting Commerce Navigator (694972C)"
              - "IBM Consulting Modern Data Accelerators (694966X)"
              - "IBM Consulting Transition Engine (694975T)"
              - "IBM Ignite Quality and Test (694985B)"
              - "IBM Ignite Quality and Test Plus (694989T)"
              - "IBM Intelligent Delivery Suite for SAP Applications (694974D)"
              - "IBM Manage on Mainframe (694975M)"
              - "IBM Services Devops Commander (694979G / 694979J)"
          ui:widget: "checkboxes"
        llmModels:
          title: LLM models in Scope
          type: array
          description: "If the contract specifies LLM model, pls provide the details below.\nNote: The following models are hosted in watsonx, and watsonx instance is available in London, Dallas, Frankfurt, Toronto, Sydney and Tokyo"
          items:
            type: string
            enum:
              - "Mistral Large (available in London, Dallas, Frankfurt)"
              - "Llama3 8B Instruct (available in London, Dallas, Frankfurt, Tokyo)"
              - "Code Llama (available in London, Dallas, Frankfurt, Tokyo)"
              - "Llama3 70B Instruct (available in London, Dallas, Frankfurt, Tokyo)"
              - "Granite 34B Code Instruct V2 (available in Dallas)"
              - "Mixtral 8x7b Instruct (available in London, Dallas, Frankfurt, Tokyo)"
              - "Granite 13B V2.1 (available in London, Dallas, Frankfurt, Tokyo)"
          ui:widget: "checkboxes"
        otherAssets:
          title: Other Assets in Scope
          type: string
          description: Other assets in scope
          default: "Not specified"
        accountCoachEmail:
          title: Account Coach Email
          type: string
          format: email
          description: Email of the account coach
        accountMentorEmail:
          title: Account Mentor Email
          type: string
          format: email
          description: Email of the account mentor
        accountTeamName:
          title: Account Team Name
          type: string
          description: Name of the account team in ICA
      properties:
        migrationFromIcaGlobal:
          title: Are you migrating from the ICA Global instance (servicesessentials.ibm.com)?
          type: string
          description: "Onboarded accounts will be structured in ICA as 'Account > Project Team'"
          ui:widget: "radio"
          enum:
            - "Yes"
            - "No"
          default: "No"
          ui:description: "Note: PoC Accounts will not be migrated"
        supportTeamLocationRestrictions:
          title: Support team location restrictions?
          type: string
          description: "Are there any geographical, regulatory, or security-based restrictions on the locations from which the support team can operate?"
          ui:widget: "radio"
          enum:
            - "YES"
            - "NO"
          default: "NO"
      dependencies:
        migrationFromIcaGlobal:
          oneOf:
            - properties:
                migrationFromIcaGlobal:
                  enum:
                    - "Yes"
                migrationAccountsProjectTeams:
                  title: Please provide the names of the Account(s) and their associated Project Teams from the ICA Global instance that need to be migrated to the ICA Regional instance
                  type: string
                  description: "Enter accounts and project teams to migrate"
                  ui:widget: "textarea"
                migrationIcaTeams:
                  title: If the Accounts were not created, kindly share the list of ICA Teams names from ICA Global instance be onboarded
                  type: string
                  description: "Example 1: Account 1 > Project Team A, Project Team B\nExample 2: Team A, Team B, Team C"
                  ui:widget: "textarea"
              required:
                - "migrationAccountsProjectTeams"
            - properties:
                migrationFromIcaGlobal:
                  enum:
                    - "No"
        supportTeamLocationRestrictions:
          oneOf:
            - properties:
                supportTeamLocationRestrictions:
                  enum:
                    - "YES"
                supportTeamLocationDetails:
                  title: Pls provide the details of support team location restrictions
                  type: string
                  description: "Details of any geographical, regulatory, or security-based restrictions"
                  ui:widget: "textarea"
              required:
                - "supportTeamLocationDetails"
            - properties:
                supportTeamLocationRestrictions:
                  enum:
                    - "NO"

  steps:
    - id: triggerWebhook
      name: Trigger Jira Issue Creation
      action: http:backstage:trigger
      input:
        url: ${{ parameters.webhookUrl | default('http://jira-issue-listener.default.svc.cluster.local:8080') }}
        method: POST
        headers:
          Content-Type: application/json
        body:
          jira_token: ${{ parameters.jiraToken }}
          jira_username: ""
          client_name: ${{ parameters.clientName }}
          project_contact_name: ${{ parameters.projectContactName }}
          offering_selection: ${{ parameters.offeringSelection }}
          project_contract_id: ${{ parameters.projectContractId }}
          project_contract_end_date: ${{ parameters.projectContractEndDate }}
          project_gbg_id: ${{ parameters.projectGbgId }}
          project_type_of_user: ${{ parameters.projectTypeOfUser }}
          project_no_of_expected_end_users: ${{ parameters.projectNoOfExpectedEndUsers }}
          project_data_usage: ${{ parameters.projectDataUsage }}
          client_location: ${{ parameters.clientLocation }}
          ica_instance: ${{ parameters.icaInstance }}
          project_region: ${{ parameters.projectRegion }}
          project_market: ${{ parameters.projectMarket }}
          project_sector: ${{ parameters.projectSector }}
          project_assistant_packs: ${{ parameters.projectAssistantPacks }}
          project_productivity_assets: ${{ parameters.projectProductivityAssets }}
          account_coach_email: ${{ parameters.accountCoachEmail }}
          account_mentor_email: ${{ parameters.accountMentorEmail }}
          account_team_name: ${{ parameters.accountTeamName }}
          llm_models: ${{ parameters.llmModels }}
          other_assets: ${{ parameters.otherAssets }}
          migration_from_ica_global: ${{ parameters.migrationFromIcaGlobal }}
          migration_accounts_project_teams: ${{ parameters.migrationAccountsProjectTeams }}
          migration_ica_teams: ${{ parameters.migrationIcaTeams }}
          support_team_location_restrictions: ${{ parameters.supportTeamLocationRestrictions }}
          support_team_location_details: ${{ parameters.supportTeamLocationDetails }}

    - id: logSummary
      name: Summary
      action: debug:log
      input:
        message: |
          Triggered Jira issue creation for client: ${{ parameters.clientName }}
          Check the Tekton pipeline status for results.

  output:
    links:
      - title: Tekton Dashboard
        url: ${{ parameters.tektonDashboardUrl | default('http://tekton-dashboard.tekton-pipelines.svc.cluster.local:8080') }}
