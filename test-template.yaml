apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: run-external-workflow
  title: Run External Workflow
  description: Triggers an external workflow using the Orchestrator plugin.
spec:
  owner: user:guest
  type: service

  parameters:
    - id: workflow_id
      title: Workflow ID
      type: string
      description: The ID of the external workflow to run.
      ui:autofocus: true
    - id: workflow_parameters
      title: Workflow Parameters
      type: object
      description: Parameters to pass to the external workflow.
      properties:
        name:
          type: string
          title: Name
          description: A name parameter for the workflow.
        environment:
          type: string
          title: Environment
          description: The target environment for the workflow.

  steps:
    - id: run-orchestrator-workflow
      name: Run Orchestrator Workflow
      action: orchestrator:workflow:run
      input:
        workflow_id: ${{ parameters.workflow_id }}
        parameters: ${{ parameters.workflow_parameters }}
    - id: log-output
      name: Log Output
      action: builtin:log
      input:
        message: "External workflow '${{ parameters.workflow_id }}' triggered successfully."
